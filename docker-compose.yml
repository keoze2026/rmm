services:
  rmm-db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - rmm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  rmm-redis:
    image: redis:8-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  rmm-server:
    build: ./rmm-server
    restart: unless-stopped
    depends_on:
      rmm-db:
        condition: service_healthy
      rmm-redis:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: rmm-db
      POSTGRES_PORT: 5432
      REDIS_HOST: rmm-redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      JWT_SECRET: ${JWT_SECRET}
      ENROLL_SECRET: ${ENROLL_SECRET}
      ENV: production
      DEBUG: "false"
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8765"
      - --ssl-keyfile
      - /certs/key.pem
      - --ssl-certfile
      - /certs/cert.pem
    volumes:
      - ./certs:/certs:ro
    ports:
      - "8765:8765"

volumes:
  rmm_pgdata:
