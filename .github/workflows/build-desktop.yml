name: Build Desktop Console

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build: npm run dist:win
            artifact: rmm-console-windows
          - os: macos-latest
            build: npm run dist:mac
            artifact: rmm-console-mac
          - os: ubuntu-latest
            build: npm run dist:linux
            artifact: rmm-console-linux

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: rmm-desktop

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build installer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: ${{ matrix.build }}

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            rmm-desktop/dist/*.exe
            rmm-desktop/dist/*.dmg
            rmm-desktop/dist/*.AppImage
            rmm-desktop/dist/*.deb
          if-no-files-found: ignore

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: installers

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: installers/**/*
          generate_release_notes: true
