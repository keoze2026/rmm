name: Build Agent

on:
  workflow_dispatch:
  push:
    tags:
      - "agent-v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: rmm-agent-windows
          - os: macos-latest
            artifact: rmm-agent-mac
          - os: ubuntu-latest
            artifact: rmm-agent-linux
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: rmm-agent
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write baked config.json
        shell: bash
        run: |
          cat > config.json << 'CFG'
          {
            "server_url": "${{ secrets.AGENT_SERVER_URL }}",
            "enroll_secret": "${{ secrets.AGENT_ENROLL_SECRET }}",
            "tls_insecure": false
          }
          CFG

      - name: Build agent
        run: pyinstaller rmm-agent.spec

      - name: Bundle config next to binary
        shell: bash
        run: cp config.json dist/

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            rmm-agent/dist/*
          if-no-files-found: ignore
