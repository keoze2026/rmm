name: Build Agent

on:
  workflow_dispatch:
  push:
    tags:
      - "agent-v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: rmm-agent-windows
          - os: macos-latest
            artifact: rmm-agent-mac
          - os: ubuntu-latest
            artifact: rmm-agent-linux
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: rmm-agent
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux system libs
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-dev libgirepository1.0-dev \
            gir1.2-gtk-3.0 gir1.2-appindicator3-0.1 \
            libcairo2-dev pkg-config python3-gi \
            xvfb libxtst6 libpng-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write baked config.json
        shell: bash
        run: |
          cat > config.json << 'CFG'
          {
            "server_url": "${{ secrets.AGENT_SERVER_URL }}",
            "enroll_secret": "${{ secrets.AGENT_ENROLL_SECRET }}",
            "tls_insecure": false
          }
          CFG

      - name: Build agent
        run: pyinstaller rmm-agent.spec

      # ---------------- WINDOWS: wrap the .exe in an Inno Setup installer ----------------
      # Defender is far more likely to allow a proper installer than a bare PyInstaller .exe.
      # The installer copies the app to Program Files, adds a Start-menu + startup shortcut,
      # and launches it at the end so the machine appears immediately.
      - name: Build Windows installer
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $iss = @"
          [Setup]
          AppName=Remote Support Agent
          AppVersion=1.0
          DefaultDirName={autopf}\RemoteSupportAgent
          DefaultGroupName=Remote Support Agent
          DisableProgramGroupPage=yes
          OutputDir=installer
          OutputBaseFilename=RemoteSupportAgent-Setup
          PrivilegesRequired=lowest
          ArchitecturesInstallIn64BitMode=x64compatible

          [Files]
          Source: "dist\rmm-agent.exe"; DestDir: "{app}"; Flags: ignoreversion

          [Icons]
          Name: "{group}\Remote Support Agent"; Filename: "{app}\rmm-agent.exe"
          Name: "{userstartup}\Remote Support Agent"; Filename: "{app}\rmm-agent.exe"

          [Run]
          Filename: "{app}\rmm-agent.exe"; Description: "Start Remote Support Agent"; Flags: nowait postinstall skipifsilent
          "@
          Set-Content -Path installer.iss -Value $iss -Encoding UTF8
          # Inno Setup is preinstalled on GitHub windows-latest runners.
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss
          Copy-Item installer\RemoteSupportAgent-Setup.exe dist\RemoteSupportAgent-Setup.exe -Force

      # ---------------- LINUX: keep the raw binary + config ----------------
      - name: Bundle config next to binary
        shell: bash
        run: cp config.json dist/ || true

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: rmm-agent/dist/*
          if-no-files-found: warn